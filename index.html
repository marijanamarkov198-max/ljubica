<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>za ljubicu💖</title>
<style>

#love {

position: absolute;

top: 50%;

left: 50%;

transform: translate(-50%, -50%) scale(0);

font-size: 130px;

color: hotpink;

font-weight: bold;

z-index: 20;

opacity: 0;

pointer-events: none;

text-shadow:

0 0 15px #ff69b4,

0 0 30px #ff69b4,

0 0 60px #ff1493,

0 0 120px #ff1493;

}

#love.show {

animation: loveBoom 4s forwards;

}

@keyframes loveBoom {

0%{opacity:0;transform:translate(-50%,-50%) scale(0);}

20%{opacity:1;transform:translate(-50%,-50%) scale(1);}

55%{transform:translate(-50%,-50%) scale(3);}

75%{transform:translate(-50%,-50%) scale(5);filter:brightness(2);}

100%{opacity:0;transform:translate(-50%,120vh) scale(0.2);}

}

body {

margin: 0;

overflow: hidden;

background: black;

font-family: Arial;

}

.curtain {

position: fixed;

top: 0;

width: 50%;

height: 100%;

background: linear-gradient(to right, #8b0000, #ff1e56);

z-index: 10;

transition: 2s ease;

box-shadow: inset 0 0 40px rgba(0,0,0,0.5);

}

#left { left: 0; }

#right { right: 0; }

body.loaded #left { transform: translateX(-100%); }

body.loaded #right { transform: translateX(100%); }

#photo {

position: absolute;

top: 50%;

left: 50%;

transform: translate(-50%, -50%);

width: 330px;

border-radius: 25px;

opacity: 0;

transition: 2s ease;

z-index: 2;

}

body.loaded #photo {

opacity: 1;

}

.name {

position: absolute;

top: -50px;

color: pink;

font-size: 26px;

animation: fall linear infinite;

opacity: 0.9;

text-shadow: 0 0 8px pink, 0 0 25px hotpink;

}

@keyframes fall {

0% { transform: translateY(-100px); }

100% { transform: translateY(110vh); }

}

.secret{

position:fixed;

width:80px;

height:80px;

z-index:999;

cursor:pointer;

}

.tl{top:0;left:0;}

.tr{top:0;right:0;}

.bl{bottom:0;left:0;}

.br{bottom:0;right:0;}

#secretMessage{

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

font-size:40px;

color:#8de8ff;

opacity:0;

transition:1s;

z-index:1000;

text-align:center;

text-shadow:0 0 10px #8de8ff,0 0 50px #00d9ff;

}

#secretMessage.show{

opacity:1;

}
</style>
</head>
 <body>
<div id="left" class="curtain"></div>
<div id="right" class="curtain"></div>
<div id="love">VOLIM TE</div>
<img id="photo" src="slika.png">
<div class="secret tl"></div>
<div class="secret tr"></div>
<div class="secret bl"></div>
<div class="secret br"></div>
<div id="secretMessage">

💙 minus i minus daju plus💙
</div>
<script>

let words = [

"ljubica","bebica","simica","simecki",

"buba","beba","mici","micka","picka", "pecurka"

];

function spawn() {

let el = document.createElement("div");

el.className = "name";

el.innerText = words[Math.floor(Math.random() * words.length)];

el.style.left = Math.random() * window.innerWidth + "px";

el.style.animationDuration = (5 + Math.random() * 4) + "s";

document.body.appendChild(el);

setTimeout(() => el.remove(), 10000);

}

window.onload = () => {

document.body.classList.add("loaded");

setInterval(spawn, 120);

setTimeout(() => {

document.getElementById("love").classList.add("show");

}, 10000);

document.querySelectorAll(".secret").forEach(el => {

el.addEventListener("click", () => {

document.getElementById("secretMessage").classList.add("show");

});

});

};
</script>
</body>
</html>
